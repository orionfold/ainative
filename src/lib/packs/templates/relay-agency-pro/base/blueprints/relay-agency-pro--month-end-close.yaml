id: relay-agency-pro--month-end-close
name: Client Month-End Close
description: >
  The scheduled close: roll up every client's month — work delivered, retainer
  and fees due, AI spend attributed — draft the invoice lines into the
  engagements ledger, and put per-client margin on one screen. Runs on the 1st
  for the month just ended; every variable has a default so the scheduler can
  fire it with no input.
version: "1.0.0"
domain: work
tags: [finance, month-end-close, invoicing, margin, scheduled]
pattern: checkpoint
difficulty: intermediate
estimatedDuration: "20-40 min"
author: Orionfold
# NOTE: this blueprint is fired by the month-end schedule with NO variables —
# every variable below must keep a default (the pack's tests enforce this).
variables:
  - id: period
    type: text
    label: Period
    description: Which month to close
    required: false
    default: "the month just ended"
  - id: focus
    type: textarea
    label: Focus notes
    description: Anything the principal wants this close to pay attention to
    required: false
    default: ""
steps:
  - name: Roll up the month per client
    profileId: relay-agency-pro--finance-controller
    requiresApproval: false
    promptTemplate: >
      Close {{period}} for the whole client book. Enumerate every client from
      the clients and engagements tables — do not work from memory — and for
      each client roll up: work delivered this period (runs and tasks you can
      see), retainer and project fees due, AI spend attributable to the
      client, and pass-throughs. Iterate across ALL clients inside this single
      run using the injected table tools, batching reads instead of per-client
      loops. Where cost attribution is ambiguous, put it under
      "unattributed" — never smear it across clients. {{focus}}
    expectedOutput: >
      A per-client rollup table (billed, cost, margin) plus an unattributed
      remainder, each figure traceable to rows.
  - name: Draft invoice lines into the ledger
    profileId: relay-agency-pro--finance-controller
    requiresApproval: true
    promptTemplate: >
      From the rollup, draft the invoice lines for {{period}} into the
      engagements table: one row per line with client, ledger date, category
      (retainer / project-fee / ai-spend / pass-through), a
      bookkeeper-acceptable description, SIGNED amount (revenue positive,
      cost negative), and status "draft". Before inserting, check for an
      existing draft row for the same client + period + category so a re-run
      never doubles lines. List every row you inserted and every duplicate
      you skipped.
    expectedOutput: >
      Draft ledger rows inserted (idempotently), with an insert/skip report.
  - name: Publish the close report
    profileId: relay-agency-pro--finance-controller
    requiresApproval: false
    promptTemplate: >
      Produce the close report for {{period}}: per-client sections (billed,
      cost, margin %, variance vs. prior month) and a one-screen agency
      rollup. Flag any client whose margin dropped more than 10 points
      month-over-month, any failed reconciliation, and anything left
      unattributed. Lead with the exceptions, not the totals.
    expectedOutput: >
      A close report the principal reads on the 1st: exceptions first,
      per-client margin, agency rollup.

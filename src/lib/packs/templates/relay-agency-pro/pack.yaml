description: >
  Relay Agency runs a workflow. Agency Pro runs your agency. Five chapters of
  agency operating system: a Finance Cockpit that closes your month by itself
  (per-client rollups, margin on one screen, a scheduled month-end close);
  Intake Pipelines that turn a dropped row into the right client workflow
  automatically; a New-Business Machine that takes a prospect from research to
  signed engagement letter; client-safe Governance profiles with hard tool
  policies and a per-client audit export; and a deep Commercial Real Estate
  renewal engine — critical dates, escalations, comps, LOI drafts, portfolio
  rent roll. Nonprofit deep chapter arrives in v0.2.0 as your first included
  update. Everything installs offline; your license never phones home.
